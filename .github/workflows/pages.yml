name: Deploy Static Portfolio

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare site folder
        run: |
          # Copy assets into static/ so relative paths work from index.html
          cp -R assets static/assets
          touch static/.nojekyll
          echo "Site folder contents:"
          find static -type f | sort | head -60

      - name: Verify index.html exists
        run: test -f static/index.html && echo "OK" || (echo "Missing static/index.html" && exit 1)

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: static

      - name: Deploy GitHub Pages site
        id: deployment
        uses: actions/deploy-pages@v4
