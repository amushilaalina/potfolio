name: Deploy Flet Portfolio

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build Flet app
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            pip install flet
          fi

      - name: Check Python syntax
        run: |
          python -m py_compile main.py

      - name: Build Flet web app
        run: |
          flet build web --yes --verbose --no-rich-output --skip-flutter-doctor --base-url potfolio --route-url-strategy hash

      - name: Prepare static Pages folder
        run: |
          rm -rf static
          mkdir -p static
          cp -R build/web/. static/
          touch static/.nojekyll

      - name: Verify static output
        run: |
          test -f static/index.html
          echo "Static folder ready:"
          find static -maxdepth 3 -type f | head -80

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: static

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy GitHub Pages site
        id: deployment
        uses: actions/deploy-pages@v4
